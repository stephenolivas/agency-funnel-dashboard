name: Save Weekly Archive

on:
  schedule:
    # Sunday 11 PM PT == Monday 07:00 UTC (PDT). Freezes the just-ended Mon–Sun.
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  freeze:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - name: Resolve last week's Monday
        id: wk
        run: echo "monday=$(date -u -d 'last monday - 7 days' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Freeze week
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python fetch_and_build.py --week "${{ steps.wk.outputs.monday }}"

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archives/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Freeze weekly archive ${{ steps.wk.outputs.monday }}"
          git pull --rebase --strategy-option=ours origin main
          git push
