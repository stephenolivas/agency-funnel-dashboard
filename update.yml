name: Update Dashboard

on:
  workflow_dispatch:

concurrency:
  group: agency-funnel-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Build dashboard
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python fetch_and_build.py

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html archives/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase --strategy-option=ours origin main
          git push
